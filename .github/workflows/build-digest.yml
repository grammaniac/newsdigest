name: build-digest

# data/ 에 JSON 이 들어오면(=아침 루틴이 그날 데이터를 커밋하면)
# 고정 렌더러로 HTML 을 만들고 index 를 갱신해 다시 커밋한다.
# 사람도 LLM도 개입하지 않는다. GitHub Pages 가 그 결과를 자동 배포한다.

on:
  push:
    branches: [main]
    paths:
      - "data/**.json"
      - "tools/render.py"

permissions:
  contents: write

# 동시에 두 번 돌지 않도록
concurrency:
  group: build-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render all digests from data/
        run: |
          shopt -s nullglob
          for f in data/*.json; do
            echo "rendering $f"
            python3 tools/render.py "$f"
          done

      - name: Commit built pages
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "Build digest pages [skip ci]"
            git push
          fi
